[build]
  publish = "dist/public"
  command = "npm run build && node scripts/build-functions.js"

[build.environment]
  NODE_VERSION = "18"

[[edge_functions]]
  path = "/sages/*"
  function = "sage-meta"

[[edge_functions]]
  path = "/sitemap.xml"
  function = "sitemap"

[[edge_functions]]
  path = "/*"
  function = "page-meta"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["express", "drizzle-orm", "@neondatabase/serverless", "resend", "@supabase/supabase-js"]

[dev]
  command = "npm run dev"
  port = 5000